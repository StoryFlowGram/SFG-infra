name: sfg-platform-prod

services:

  nginx:
    image: nginx:alpine
    container_name: sfg-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-local.conf:/etc/nginx/nginx.conf
    networks:
      - sfg-network
    depends_on:
      - gateway
      - frontend
    restart: always

  gateway:
    build: 
      context: C:\spaced-repetition-bot\Backend\api-gateway
      dockerfile: Dockerfile
    container_name: sfg-gateway
    env_file: .env.local
    environment:
      - JWT_SECRET_KEY=${GLOBAL_JWT_SECRET}
    networks:
      - sfg-network
    depends_on:
      - identity-service
      - book-service
    restart: always

  frontend:
    build: 
      context: C:\spaced-repetition-bot\Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    container_name: sfg-frontend
    env_file: .env.local
    networks:
      - sfg-network
    restart: always

  bot-service:
    build:
      context: C:\spaced-repetition-bot\bot-service
      dockerfile: Dockerfile
    container_name: sfg-bot-service
    env_file: .env.local
    networks:
      - sfg-network
    restart: always

  identity-service:
    build:
      context: C:\spaced-repetition-bot\Backend\identity-service
      dockerfile: Dockerfile
    container_name: sfg-identity-service
    env_file: .env.local
    ports:
      - "8002:8000"
    depends_on:
      identity-db:
        condition: service_healthy
    networks:
      - sfg-network
    restart: always

  book-service:
    build:
      context: C:\spaced-repetition-bot\Backend\book-service
      dockerfile: Dockerfile
    container_name: sfg-book-service
    env_file: .env.local
    environment:
      - TASKIQ_BROKER_URL=${TASKIQ_BROKER_URL}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - S3_REGION_NAME=${S3_REGION_NAME}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    depends_on:
      book-db:
        condition: service_healthy
      book-redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8001:8000"
    networks:
      - sfg-network
    restart: always

  book-worker:  
    build:
      context: C:\spaced-repetition-bot\Backend\book-service
      dockerfile: Dockerfile
    container_name: sfg-book-worker
    command: taskiq worker app.infrastructure.taskiq.broker:broker
    env_file: .env.local
    environment:
      - TASKIQ_BROKER_URL=${TASKIQ_BROKER_URL}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - S3_REGION_NAME=${S3_REGION_NAME}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    depends_on:
      book-redis:
        condition: service_healthy
      book-db: 
        condition: service_healthy
    networks:
      - sfg-network
    restart: always

  learning-service:
    build:
      context: C:\spaced-repetition-bot\Backend\learning-service
      dockerfile: Dockerfile
    container_name: sfg-learning-service
    env_file: .env.local
    depends_on:
      learn-db:
        condition: service_healthy
    networks:
      - sfg-network
    restart: always

  reader-service:
    build:
      context: C:\spaced-repetition-bot\Backend\reader-service
      dockerfile: Dockerfile
    container_name: sfg-reader-service
    env_file: .env.local
    depends_on:
      reader-db:
        condition: service_healthy
    networks:
      - sfg-network
    restart: always

  translation-service:
    build:
      context: C:\spaced-repetition-bot\Backend\translation-service
      dockerfile: Dockerfile
    container_name: sfg-translation-service
    env_file: .env.local
    networks:
      - sfg-network
    restart: always


  # DATABASES
  identity-db:  
    image: postgres:15
    container_name: sfg-identity-db
    environment:
      POSTGRES_USER: postgres_identity
      POSTGRES_PASSWORD: postgres_identity
      POSTGRES_DB: identity-db
    volumes:
      - identity_pg_data_v3:/var/lib/postgresql/data 
    networks:
      - sfg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_identity -d identity-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  book-db:
    image: postgres:15
    container_name: sfg-book-db
    environment:
      POSTGRES_USER: postgres_book
      POSTGRES_PASSWORD: postgres_book
      POSTGRES_DB: book-db
    volumes:
      - book_pg_data_v3:/var/lib/postgresql/data
    networks:
      - sfg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_book -d book-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  learn-db:
    image: postgres:15
    container_name: sfg-learn-db
    environment:
      POSTGRES_USER: postgres_learn
      POSTGRES_PASSWORD: postgres_learn
      POSTGRES_DB: learn-db
    volumes:
      - learn_pg_data_v3:/var/lib/postgresql/data 
    networks:
      - sfg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_learn -d learn-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  reader-db:  
    image: postgres:15
    container_name: sfg-reader-db
    environment:
      POSTGRES_USER: postgres_reader
      POSTGRES_PASSWORD: postgres_reader
      POSTGRES_DB: reader-db
    volumes:
      - reader_pg_data_v3:/var/lib/postgresql/data 
    networks:
      - sfg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_reader -d reader-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  book-redis:
    image: redis:7-alpine
    container_name: sfg-book-redis
    networks:
      - sfg-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  minio:
    image: minio/minio
    container_name: sfg-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data_v3:/data
    networks:
      - sfg-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always

volumes:
  book_pg_data_v3:
  identity_pg_data_v3:
  learn_pg_data_v3:
  reader_pg_data_v3:
  minio_data_v3:
  certbot_conf:

networks:
  sfg-network:
    driver: bridge